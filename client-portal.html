<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Gallery Login — Farhan's Photography</title>

<link rel="icon" type="image/png" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/favicon.png">

<meta name="description" content="Access your private gallery from Farhan's Photography.">
<meta name="robots" content="noindex">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a96e;
    --gold-light: #e2c99a;
    --dark: #0a0a0a;
    --dark-2: #111111;
    --dark-3: #1a1a1a;
    --dark-4: #242424;
    --text: #f0ece4;
    --muted: #8a8070;
    --error: #d97a6e;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Barlow', sans-serif;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    padding: 1.5rem 4rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-decoration: none;
  }

  .nav-logo img { height: 34px; width: auto; display: block; }

  .nav-back {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
  }

  .nav-back:hover { color: var(--gold); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 4rem;
  }

  .portal-card {
    width: 100%;
    max-width: 420px;
    background: var(--dark-2);
    border: 1px solid rgba(201,169,110,0.12);
    padding: 3rem 2.5rem;
  }

  .portal-eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
    text-align: center;
  }

  .portal-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 300;
    text-align: center;
    margin-bottom: 0.6rem;
  }

  .portal-sub {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 2.2rem;
  }

  .form-group { margin-bottom: 1.3rem; }

  .form-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .form-input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--dark-3);
    border: 1px solid rgba(201,169,110,0.15);
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.9rem;
    transition: border-color 0.3s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .form-input::placeholder { color: rgba(240,236,228,0.3); }

  .btn-primary {
    width: 100%;
    padding: 0.95rem;
    background: var(--gold);
    color: var(--dark);
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.3s, transform 0.2s;
    margin-top: 0.5rem;
  }

  .btn-primary:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.6; cursor: default; }

  .portal-message {
    margin-top: 1.2rem;
    padding: 0.9rem 1rem;
    font-size: 0.82rem;
    line-height: 1.6;
    text-align: center;
    display: none;
  }

  .portal-message.error {
    display: block;
    background: rgba(217,122,110,0.1);
    border: 1px solid rgba(217,122,110,0.3);
    color: var(--error);
  }

  .portal-message.success {
    display: block;
    background: rgba(201,169,110,0.1);
    border: 1px solid rgba(201,169,110,0.3);
    color: var(--gold-light);
  }

  .portal-message a.btn-primary {
    display: block;
    margin-top: 1rem;
  }

  .portal-footer-note {
    margin-top: 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.7;
  }

  .portal-footer-note a { color: var(--gold); text-decoration: none; }
  .portal-footer-note a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    nav { padding: 1.2rem 1.5rem; }
    .portal-card { padding: 2.2rem 1.6rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><img src="images/logo.png" alt="Farhan's Photography logo">Farhan's Photography</a>
  <a href="index.html" class="nav-back">← Back to Site</a>
</nav>

<main>
  <div class="portal-card">
    <p class="portal-eyebrow">Client Access</p>
    <h1 class="portal-title">Your Gallery</h1>
    <p class="portal-sub">Enter the details we sent you to view and download your photos.</p>

    <form id="portalForm">
      <div class="form-group">
        <label class="form-label">Client ID</label>
        <input type="text" class="form-input" id="clientId" placeholder="e.g. FP2026-014" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-input" id="phone" placeholder="01XXXXXXXXX" required autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="off">
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">View My Gallery</button>

      <div class="portal-message" id="portalMessage" role="alert" aria-live="polite"></div>
    </form>

    <p class="portal-footer-note">Lost your details or having trouble? <a href="index.html#contact">Contact me</a> and I'll help you out.</p>
  </div>
</main>

<script>
// Replace with your deployed Apps Script Web App URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzq2o1b0eQgARjGoFydo94UFS8paZvI0rdxmsgZcuY7jH7yfg9DNGlxi6pE6EWFVls3/exec";

const form = document.getElementById("portalForm");
const submitBtn = document.getElementById("submitBtn");
const messageEl = document.getElementById("portalMessage");

form.addEventListener("submit", async function (e) {
  e.preventDefault();

  const clientId = document.getElementById("clientId").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value;

  messageEl.className = "portal-message";
  messageEl.innerHTML = "";
  submitBtn.disabled = true;
  submitBtn.textContent = "Checking…";

  try {
    const response = await fetch(SCRIPT_URL, {
      method: "POST",
      // text/plain avoids a CORS preflight that Apps Script doesn't handle well.
      // doPost() on the backend still parses this as JSON.
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ clientId, phone, password })
    });

    const result = await response.json();

    if (result.success) {
      messageEl.className = "portal-message success";
      messageEl.innerHTML = `Access granted! Your gallery is ready.<br><a href="${result.galleryUrl}" target="_blank" rel="noopener" class="btn-primary">Open My Gallery</a>`;
      form.querySelectorAll("input").forEach(input => input.disabled = true);
    } else {
      messageEl.className = "portal-message error";
      messageEl.textContent = result.message || "Something didn't match. Please check your details.";
    }
  } catch (err) {
    messageEl.className = "portal-message error";
    messageEl.textContent = "Couldn't reach the server. Please check your connection and try again.";
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "View My Gallery";
  }
});
</script>
</body>
</html>
